services:
  - type: web
    name: parcel-label-extractor
    runtime: python
    buildCommand: |
      sudo apt-get update && sudo apt-get install -y libgl1-mesa-glx libglib2.0-0
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0